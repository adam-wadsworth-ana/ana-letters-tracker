<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>ANA Policy Letter Tracker</title>
    <link rel="stylesheet" href="styles.css">
  </head>
  <body>
    <header class="site-header">
      <div class="brand-mark" aria-label="ANA logo placeholder">ANA</div>
      <div>
        <p class="eyebrow">Policy position letters</p>
        <h1>ANA Letter Tracker</h1>
      </div>
    </header>

    <main>
      <section class="summary-band" aria-label="Tracker summary">
        <div>
          <span id="totalLetters">0</span>
          <strong>Letters</strong>
        </div>
        <div>
          <span id="totalStates">0</span>
          <strong>States/Federal</strong>
        </div>
        <div>
          <span id="latestDate">--</span>
          <strong>Latest submission</strong>
        </div>
      </section>

      <section class="map-section" aria-labelledby="mapTitle">
        <div class="section-heading">
          <div>
            <p class="eyebrow">Interactive map</p>
            <h2 id="mapTitle">Letters by State/Federal</h2>
          </div>
          <button id="clearState" class="ghost-button" type="button">Clear selection</button>
        </div>
        <div class="map-layout">
          <div id="stateMap" class="state-map" aria-label="Clickable U.S. state map"></div>
          <aside class="state-panel" aria-live="polite">
            <p class="eyebrow">Selected area</p>
            <h3 id="selectedStateName">All states</h3>
            <p id="selectedStateCount" class="muted">Select a highlighted state to view letters.</p>
            <div id="stateLetters" class="state-letters"></div>
          </aside>
        </div>
      </section>

      <section class="table-section" aria-labelledby="tableTitle">
        <div class="section-heading">
          <div>
            <p class="eyebrow">Full tracker</p>
            <h2 id="tableTitle">Submitted Letters</h2>
          </div>
          <div class="table-actions">
            <p id="resultCount" class="muted">0 records</p>
            <button id="shareView" class="ghost-button" type="button">Copy view link</button>
            <button id="clearFilters" class="ghost-button" type="button">Clear filters</button>
          </div>
        </div>

        <div class="filters" role="search">
          <label>
            <span>Search</span>
            <input id="searchInput" type="search" placeholder="Search bill, topic, state, recipient...">
          </label>
          <label>
            <span>State/Federal</span>
            <select id="stateFilter">
              <option value="">All states</option>
            </select>
          </label>
          <label>
            <span>ANA position</span>
            <select id="positionFilter">
              <option value="">All positions</option>
            </select>
          </label>
          <label>
            <span>Issue topic</span>
            <select id="topicFilter">
              <option value="">All topics</option>
            </select>
          </label>
          <label>
            <span>Action</span>
            <select id="actionFilter">
              <option value="">All actions</option>
            </select>
          </label>
          <label>
            <span>Year</span>
            <select id="yearFilter">
              <option value="">All years</option>
            </select>
          </label>
          <label>
            <span>From</span>
            <input id="dateFromFilter" type="date">
          </label>
          <label>
            <span>To</span>
            <input id="dateToFilter" type="date">
          </label>
          <label>
            <span>Sort</span>
            <select id="sortFilter">
              <option value="submissionDate:desc">Newest first</option>
              <option value="submissionDate:asc">Oldest first</option>
              <option value="state:asc">State A-Z</option>
              <option value="state:desc">State Z-A</option>
              <option value="billNumber:asc">Bill number A-Z</option>
              <option value="billNumber:desc">Bill number Z-A</option>
              <option value="billTopic:asc">Topic A-Z</option>
              <option value="billTopic:desc">Topic Z-A</option>
              <option value="anaPosition:asc">Position A-Z</option>
              <option value="anaPosition:desc">Position Z-A</option>
              <option value="submittedTo:asc">Recipient A-Z</option>
              <option value="submittedTo:desc">Recipient Z-A</option>
            </select>
          </label>
        </div>
        <div id="activeFilters" class="active-filters" aria-live="polite"></div>

        <div class="table-wrap">
          <table>
            <thead>
              <tr>
                <th><button type="button" data-sort="state">State</button></th>
                <th><button type="button" data-sort="billNumber">Bill Number</button></th>
                <th><button type="button" data-sort="billTopic">Bill Topic</button></th>
                <th><button type="button" data-sort="anaPosition">ANA Position</button></th>
                <th><button type="button" data-sort="submissionDate">Submission Date</button></th>
                <th><button type="button" data-sort="submittedTo">Submitted To</button></th>
                <th>Letter PDF</th>
              </tr>
            </thead>
            <tbody id="lettersBody"></tbody>
          </table>
        </div>
        <div class="load-more-row">
          <button id="loadMoreResults" class="ghost-button" type="button">Load more results</button>
        </div>
      </section>
    </main>

    <script src="script.js?v=20260624-share-export-chips"></script>
  </body>
</html>
